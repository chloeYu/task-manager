<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Task Manager</h1>
      <p>{{ hasAccount ? 'Sign in to your account' : 'Create a new account' }}</p>
    </div>
    <form (ngSubmit)="onSubmit(ngFormRef)" #ngFormRef="ngForm" class="login-form">
      <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
      @if (!hasAccount) {
        <div class="form-group">
          <label for="text">User Name</label>
          <input
            type="text"
            [formField]="signupForm.name"
            placeholder="James Lee"
          />
        </div>
      }
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          [formField]="hasAccount? loginForm.email : signupForm.email"
          email
          placeholder="you@example.com"
        />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          [formField]="hasAccount? loginForm.password : signupForm.password"
        />
      </div>
      @if (!hasAccount) {
        <div class="form-group">
          <label for="password"
            >Confirm password
            @if (passwordMismatch()) {
              <span class="password-mismatch">Passwords do not match</span>
            }
          </label>
          <input
            type="password"
            [formField]="signupForm.confirmPassword"
          />
        </div>
      }
      <button type="submit" class="login-button" [disabled]="isLoading() || ngFormRef.invalid">
        @if (hasAccount) {
          {{ isLoading() ? 'Logging in...' : 'Log in' }}
        } @else {
          {{ isLoading() ? 'Signing in...' : 'Sign in' }}
        }
      </button>
      <div class="signup-note">
        <span>{{ hasAccount ? "Don't have an account? " : 'Already have an account? ' }}</span>
        <a [routerLink]="hasAccount ? '/signup' : '/login'">
          {{ hasAccount ? 'Sign up here' : 'Login here' }}
        </a>
      </div>
    </form>
  </div>
</div>
